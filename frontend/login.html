<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CardioVision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box glass-panel">
            <div class="auth-header">
                <div class="logo-icon">🫀</div>
                <h2>Welcome Back</h2>
                <p>Sign in to continue to CardioVision</p>
            </div>
            
            <div id="login-alert" class="alert alert-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="doctor@hospital.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span>Sign In</span>
                    <div class="loader" id="login-loader" style="margin-left: 10px; width: 20px; height: 20px; border-width: 2px;"></div>
                </button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a href="signup.html">Create an account</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
